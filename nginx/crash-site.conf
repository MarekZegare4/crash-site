# Crash Site – nginx reverse proxy
# Place at: /etc/nginx/sites-available/crash-site
# Enable:   ln -s /etc/nginx/sites-available/crash-site /etc/nginx/sites-enabled/
#
# Replace YOURDOMAIN with your actual domain (e.g. crashsite.app)
# SSL certs are managed by Certbot – run after enabling this file:
#   certbot --nginx -d YOURDOMAIN

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name YOURDOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name YOURDOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOURDOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOURDOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Allow large uploads (drone photos)
    client_max_body_size 10M;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # ── SSE stream — must be before /api/ (longest-prefix wins) ─────────────
    location /api/announcements/stream {
        proxy_pass             http://127.0.0.1:4000/api/announcements/stream;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     3600s;
        chunked_transfer_encoding on;
    }

    # ── API → backend ────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Frontend → static files ──────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Security headers for static frontend (static server at 8080 doesn't set these)
        add_header X-Content-Type-Options  "nosniff" always;
        add_header X-Frame-Options         "DENY" always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy      "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://api.dicebear.com data:; connect-src 'self' https://tiles.openfreemap.org https://*.basemaps.cartocdn.com https://server.arcgisonline.com; worker-src blob:; frame-ancestors 'none'; form-action 'none';" always;
    }
}
