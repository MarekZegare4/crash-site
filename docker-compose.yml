services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    # Bound to localhost – nginx proxies /api/ here; not exposed to the internet directly
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    env_file:
      - .env

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
    restart: unless-stopped
    # Bound to localhost – nginx proxies / here; not exposed to the internet directly
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - backend
